<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seuils — Galerie</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="top">
    <div class="nav-row">
      <div id="catButtons" class="catButtons"></div>
      <select id="catSelect" class="catSelect" aria-label="Choisir une largeur de seuil"></select>
    </div>
  </header>

  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    function sendHeight() {
      const h = Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0
      );
      if (window.parent !== window) {
        window.parent.postMessage({ type: "resize", height: h }, "*");
      }
    }

    function sendHeightSoon() {
      requestAnimationFrame(() => {
        sendHeight();
        setTimeout(sendHeight, 150);
        setTimeout(sendHeight, 600);
      });
    }

    window.addEventListener("load", sendHeightSoon);
    window.addEventListener("resize", sendHeightSoon);

    const CATEGORIES = [
      { key: "18", label: "18cm" },
      { key: "22", label: "22cm" },
      { key: "25", label: "25cm" },
      { key: "28", label: "28cm" }
    ];

    const LENGTHS = [50, 60, 70, 80, 90, 100, 110, 120, 130, 140, 150, 160, 170, 180, 190];

    let currentCategory = "18";

    let PRICE_MAP = Object.create(null);
    let STOCK_MAP = Object.create(null);

    function normalizePath(path) {
      return String(path || "")
        .trim()
        .replaceAll("\\", "/")
        .replace(/^\.?\//, "");
    }

    function normalizeSize(size) {
      return String(size || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .trim();
    }

    function getKey(path, taille) {
      const size = String(taille).replace("cm", "").trim();
      return `${normalizePath(path)}|${size}`;
    }

    function buildImagePath(width, length) {
      return `galerie/${width}/seuils-${width}-${length}cm.png`;
    }

    function getProductTitle(width) {
      return `Seuil ${width} cm`;
    }

    function getLengthLabel(length) {
      return `${length} cm`;
    }

    function getExcelSizeValue(length) {
      return `${length}`;
    }

    function formatPrice(value) {
      const num = Number(String(value).replace(",", "."));
      if (!isFinite(num)) return null;

      const fixed = num.toFixed(2);
      const parts = fixed.split(".");
      return {
        intPart: parts[0],
        decPart: parts[1]
      };
    }

    function getStockLabel(value) {
      if (value === undefined || value === null || String(value).trim() === "") return "";

      const n = Number(String(value).replace(",", "."));
      if (!Number.isFinite(n)) return "";

      return n >= 1 ? "✅ En stock" : "⚠️ Rupture";
    }

    async function loadPrices() {
      try {
        const response = await fetch("prix/prix.xlsx", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "", raw: false });

        const priceMap = Object.create(null);
        const stockMap = Object.create(null);

        rows.forEach(row => {
          const path = normalizePath(row.path || row.Path || row.PATH || "");
          const taille = row.taille ?? row.Taille ?? row.TAILLE ?? "";
          const price = row.prix_tvac ?? row.Prix_TVAC ?? row.PRIX_TVAC ?? row.prix ?? row.Prix ?? "";
          const stock = row.disponible ?? row.Disponible ?? row.DISPO ?? row.dispo ?? row.stock ?? row.Stock ?? "";

          if (!path) return;

          const key = getKey(path, taille);

          if (price !== "") {
            const num = Number(String(price).replace(",", ".").trim());
            if (Number.isFinite(num)) {
              priceMap[key] = num;
            }
          }

          if (stock !== "") {
            const numStock = Number(String(stock).replace(",", ".").trim());
            if (Number.isFinite(numStock)) {
              stockMap[key] = numStock;
            }
          }
        });

        PRICE_MAP = priceMap;
        STOCK_MAP = stockMap;
      } catch (error) {
        console.error("Erreur chargement prix.xlsx :", error);
        PRICE_MAP = Object.create(null);
        STOCK_MAP = Object.create(null);
      }
    }

    function getPrice(width, length) {
      const path = buildImagePath(width, length);
      const taille = getExcelSizeValue(length);
      return PRICE_MAP[getKey(path, taille)];
    }

    function getStock(width, length) {
      const path = buildImagePath(width, length);
      const taille = getExcelSizeValue(length);
      return STOCK_MAP[getKey(path, taille)];
    }

    function renderCategoryButtons() {
      const wrap = document.getElementById("catButtons");
      wrap.innerHTML = "";

      CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "catBtn" + (cat.key === currentCategory ? " active" : "");
        btn.type = "button";
        btn.dataset.cat = cat.key;

        btn.innerHTML = `
          <div class="catIcon catIconText">
            <span>${cat.label}</span>
          </div>
          <span class="catLabel">Seuil</span>
        `;

        btn.addEventListener("click", () => {
          currentCategory = cat.key;
          syncSelect();
          renderAll();
        });

        wrap.appendChild(btn);
      });
    }

    function renderSelect() {
      const select = document.getElementById("catSelect");
      select.innerHTML = "";

      CATEGORIES.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.key;
        option.textContent = cat.label;
        if (cat.key === currentCategory) option.selected = true;
        select.appendChild(option);
      });

      select.onchange = () => {
        currentCategory = select.value;
        renderAll();
      };
    }

    function syncSelect() {
      const select = document.getElementById("catSelect");
      if (select) select.value = currentCategory;
    }

    function createPriceNode(value) {
      const wrap = document.createElement("div");
      wrap.className = "price";

      const label = document.createElement("div");
      label.className = "price-label";
      label.textContent = "Prix TVAC";

      const amount = document.createElement("div");
      amount.className = "price-amount";

      const formatted = formatPrice(value);

      if (!formatted) {
        amount.textContent = "—";
      } else {
        amount.innerHTML = `
          <span class="int">${formatted.intPart}</span>
          <span class="dec">,${formatted.decPart}</span>
          <span class="eur">€</span>
        `;
      }

      wrap.appendChild(label);
      wrap.appendChild(amount);

      return wrap;
    }

    function renderGrid() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "grid";

      LENGTHS.forEach(length => {
        const productPrice = getPrice(currentCategory, length);
        const productStock = getStock(currentCategory, length);

        const figure = document.createElement("figure");

        const caption = document.createElement("figcaption");
        caption.textContent = getProductTitle(currentCategory);

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        const img = document.createElement("img");
        img.src = buildImagePath(currentCategory, length);
        img.alt = `${getProductTitle(currentCategory)} ${getLengthLabel(length)}`;
        img.loading = "lazy";

        img.onerror = function () {
          this.style.display = "none";
          const missing = document.createElement("div");
          missing.className = "missing";
          missing.textContent = "Image manquante";
          thumb.appendChild(missing);
          sendHeightSoon();
        };

        thumb.appendChild(img);

        const size = document.createElement("div");
        size.className = "sizeBox";
        size.textContent = getLengthLabel(length);

        const stock = document.createElement("div");
        stock.className = "stock";
        stock.textContent = getStockLabel(productStock);

        const price = createPriceNode(productPrice);

        figure.appendChild(caption);
        figure.appendChild(thumb);
        figure.appendChild(size);
        figure.appendChild(stock);
        figure.appendChild(price);

        grid.appendChild(figure);
      });

      app.appendChild(grid);
      sendHeightSoon();
    }

    function renderAll() {
      renderCategoryButtons();
      renderGrid();
      sendHeightSoon();
    }

    async function init() {
      renderSelect();
      await loadPrices();
      renderAll();
    }

    init();
  </script>
</body>

</html>
